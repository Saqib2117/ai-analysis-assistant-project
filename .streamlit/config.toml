[server]
# Maximum file upload size (MB)
maxUploadSize = 100

# Enable file watcher for development
enableFileWatcher = false

# Run on localhost only
headless = true

[theme]
# Dark theme
base = "dark"
primaryColor = "#667eea"
backgroundColor = "#0a0a1a"
secondaryBackgroundColor = "#12122a"
textColor = "#e0e6f0"
font = "sans serif"

[browser]
# Disable usage stats gathering
gatherUsageStats = false

# Default server address
serverAddress = "0.0.0.0"

[runner]
# Faster reruns (disable for stability)
fastReruns = false

[logger]
# Log level
level = "info"

[global]
# Disable command line checks
disableCommandLineCheck = false

[client]
# Show error details
showErrorDetails = true
toolbarMode = "auto"